[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --benchmark-disable
    --benchmark-sort=mean
markers =
    unit: Unit tests (no I/O, mocked dependencies)
    integration: Integration tests (Flask test client + SQLite)
    performance: Performance benchmarks (requires --benchmark-enable)
